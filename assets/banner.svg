<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89dceb"/>
      <stop offset="30%" style="stop-color:#89b4fa"/>
      <stop offset="60%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="ripple1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89dceb;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="ripple2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#89dceb;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="ripple3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b4befe;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89dceb;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#89dceb"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="80%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Concentric ripple circles (water drop effect) -->
  <g opacity="0.07">
    <circle cx="650" cy="80" r="30" fill="none" stroke="#89dceb" stroke-width="1"/>
    <circle cx="650" cy="80" r="50" fill="none" stroke="#89b4fa" stroke-width="0.8"/>
    <circle cx="650" cy="80" r="70" fill="none" stroke="#b4befe" stroke-width="0.6"/>
    <circle cx="650" cy="80" r="90" fill="none" stroke="#cba6f7" stroke-width="0.4"/>
    <circle cx="150" cy="200" r="20" fill="none" stroke="#89dceb" stroke-width="0.8"/>
    <circle cx="150" cy="200" r="40" fill="none" stroke="#89b4fa" stroke-width="0.6"/>
    <circle cx="150" cy="200" r="60" fill="none" stroke="#b4befe" stroke-width="0.4"/>
  </g>

  <!-- Decorative wave shapes -->
  <path d="M0,210 Q100,190 200,200 T400,195 T600,205 T800,185 L800,280 L0,280 Z" fill="url(#ripple1)"/>
  <path d="M0,235 Q150,215 300,225 T600,220 T800,210 L800,280 L0,280 Z" fill="url(#ripple2)"/>
  <path d="M0,255 Q200,240 400,248 T800,235 L800,280 L0,280 Z" fill="url(#ripple3)"/>

  <!-- Decorative dots pattern -->
  <g opacity="0.08">
    <circle cx="700" cy="45" r="1.5" fill="#89dceb"/>
    <circle cx="720" cy="40" r="1" fill="#89b4fa"/>
    <circle cx="740" cy="50" r="1.5" fill="#b4befe"/>
    <circle cx="715" cy="60" r="1" fill="#cba6f7"/>
    <circle cx="735" cy="35" r="1" fill="#89dceb"/>
    <circle cx="755" cy="45" r="1.5" fill="#89b4fa"/>
    <circle cx="680" cy="55" r="1" fill="#b4befe"/>
    <circle cx="760" cy="58" r="1" fill="#74c7ec"/>
    <circle cx="690" cy="38" r="1.5" fill="#89dceb"/>
    <circle cx="770" cy="40" r="1" fill="#89b4fa"/>
    <circle cx="80" cy="220" r="1.5" fill="#b4befe"/>
    <circle cx="60" cy="230" r="1" fill="#89dceb"/>
    <circle cx="100" cy="235" r="1.5" fill="#89b4fa"/>
    <circle cx="75" cy="245" r="1" fill="#cba6f7"/>
    <circle cx="45" cy="225" r="1" fill="#b4befe"/>
    <circle cx="110" cy="225" r="1" fill="#89dceb"/>
  </g>

  <!-- Vim cursor block (decorative) -->
  <g opacity="0.12">
    <rect x="60" y="95" width="10" height="18" rx="1" fill="#89b4fa"/>
    <text x="80" y="110" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
          font-size="11" fill="#6c7086" letter-spacing="1">:edit</text>
  </g>

  <!-- Title -->
  <text x="400" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="64" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="10" filter="url(#glow)">RIPPLE</text>

  <!-- Accent line under title -->
  <rect x="200" y="148" width="400" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="180" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="14" fill="#a6adc8" text-anchor="middle"
        letter-spacing="4">VIM IN THE BROWSER</text>
</svg>

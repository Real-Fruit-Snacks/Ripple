<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f5c2e7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" fill="#11111b" rx="8"/>

  <!-- Hexagonal Frame -->
  <g transform="translate(100, 110)" filter="url(#softGlow)">
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="2" fill="#cba6f7" opacity="0.6"/>
    <!-- Entry node (left) -->
    <circle cx="-62.4" cy="0" r="2" fill="#cba6f7" opacity="0.5"/>
    <!-- Exit node (right) -->
    <circle cx="62.4" cy="0" r="2" fill="#cba6f7" opacity="0.5"/>

    <!-- Particle dots on hex edges -->
    <circle cx="31.2" cy="-54" r="1.2" fill="#f5c2e7" opacity="0.35"/>
    <circle cx="-31.2" cy="-54" r="1.2" fill="#cba6f7" opacity="0.3"/>
    <circle cx="31.2" cy="54" r="1.2" fill="#f5c2e7" opacity="0.3"/>
    <circle cx="-31.2" cy="54" r="1.2" fill="#cba6f7" opacity="0.35"/>
    <circle cx="-55" cy="-18" r="1" fill="#f5c2e7" opacity="0.25"/>
    <circle cx="55" cy="18" r="1" fill="#cba6f7" opacity="0.25"/>

    <!-- LOGOMARK: Cursor Ripples -->
    <!-- Text cursor (insertion point) at center -->
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#cba6f7" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

    <!-- Concentric ripple circle 1 — innermost -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#cba6f7" stroke-width="1.3" opacity="0.7"/>

    <!-- Concentric ripple circle 2 — middle -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="url(#accentGrad)" stroke-width="1.1" opacity="0.5"/>

    <!-- Concentric ripple circle 3 — outermost -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#f5c2e7" stroke-width="0.8" opacity="0.3"/>

    <!-- Shimmer dots on ripple crests -->
    <circle cx="14" cy="0" r="1.3" fill="#cba6f7" opacity="0.5"/>
    <circle cx="-14" cy="0" r="1.3" fill="#f5c2e7" opacity="0.5"/>
    <circle cx="0" cy="14" r="1.2" fill="#cba6f7" opacity="0.45"/>
    <circle cx="0" cy="-14" r="1.2" fill="#f5c2e7" opacity="0.45"/>

    <circle cx="18.4" cy="18.4" r="1" fill="#cba6f7" opacity="0.35"/>
    <circle cx="-18.4" cy="-18.4" r="1" fill="#f5c2e7" opacity="0.35"/>
    <circle cx="18.4" cy="-18.4" r="1" fill="#cba6f7" opacity="0.3"/>
    <circle cx="-18.4" cy="18.4" r="1" fill="#f5c2e7" opacity="0.3"/>

    <circle cx="26.9" cy="26.9" r="0.8" fill="#cba6f7" opacity="0.2"/>
    <circle cx="-26.9" cy="-26.9" r="0.8" fill="#f5c2e7" opacity="0.2"/>

    <!-- Cursor glow -->
    <circle cx="0" cy="0" r="4" fill="#cba6f7" opacity="0.15"/>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Project Name -->
    <text x="0" y="92" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)" letter-spacing="3">RIPPLE</text>

    <!-- Separator line -->
    <line x1="0" y1="108" x2="340" y2="108" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="132" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="11.5" fill="#cdd6f4" letter-spacing="2" opacity="0.85">BROWSER-BASED VIM EDITOR</text>

    <!-- Descriptor -->
    <text x="0" y="152" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="9" fill="#a6adc8" letter-spacing="2.5" opacity="0.6">JS · CODEMIRROR 6 · CATPPUCCIN</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: mauve to pink (light-mode darkened) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8839ef"/>
      <stop offset="40%" stop-color="#8839ef"/>
      <stop offset="100%" stop-color="#ea76cb"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea76cb"/>
      <stop offset="100%" stop-color="#8839ef"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8839ef"/>
      <stop offset="50%" stop-color="#8839ef"/>
      <stop offset="100%" stop-color="#ea76cb"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#8839ef" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#8839ef" opacity="0.04"/>

    <!-- === CURSOR RIPPLES === -->

    <!-- Text cursor (insertion point) at center -->
    <line x1="80" y1="62" x2="80" y2="78" stroke="#8839ef" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

    <!-- Cursor glow -->
    <circle cx="80" cy="70" r="4" fill="#8839ef" opacity="0.15"/>

    <!-- Concentric ripple circle 1 — innermost -->
    <circle cx="80" cy="70" r="14" fill="none" stroke="#8839ef" stroke-width="1.3" opacity="0.7"/>

    <!-- Concentric ripple circle 2 — middle -->
    <circle cx="80" cy="70" r="26" fill="none" stroke="url(#g1)" stroke-width="1.1" opacity="0.5"/>

    <!-- Concentric ripple circle 3 — outermost -->
    <circle cx="80" cy="70" r="38" fill="none" stroke="#ea76cb" stroke-width="0.8" opacity="0.3"/>

    <!-- Shimmer dots on ripple crests -->
    <circle cx="94" cy="70" r="1.3" fill="#8839ef" opacity="0.5"/>
    <circle cx="66" cy="70" r="1.3" fill="#ea76cb" opacity="0.5"/>
    <circle cx="80" cy="84" r="1.2" fill="#8839ef" opacity="0.45"/>
    <circle cx="80" cy="56" r="1.2" fill="#ea76cb" opacity="0.45"/>

    <circle cx="93" cy="83" r="1" fill="#8839ef" opacity="0.35"/>
    <circle cx="67" cy="57" r="1" fill="#ea76cb" opacity="0.35"/>
    <circle cx="93" cy="57" r="1" fill="#8839ef" opacity="0.3"/>
    <circle cx="67" cy="83" r="1" fill="#ea76cb" opacity="0.3"/>

    <circle cx="101" cy="91" r="0.8" fill="#8839ef" opacity="0.2"/>
    <circle cx="59" cy="49" r="0.8" fill="#ea76cb" opacity="0.2"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#8839ef" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#ea76cb" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "RIPPLE" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">RIPPLE</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">BROWSER-BASED VIM EDITOR</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">JS  ·  CODEMIRROR 6  ·  CATPPUCCIN</text>
</svg>
